<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G3 Architechs Website</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Fonts: Work Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .work-sans {
        font-family: "Work Sans", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
    </style>
  </head>
  <body class="work-sans">
    <header class="bg-[#ff8f0e2a] px-5 pb-3">
      <nav class="container mx-auto px-3 md:px-0">
        <div class="flex justify-between items-center py-5">
          <h2 class="text-4xl font-bold">G3 Architects</h2>
          <div class="flex hidden sm:inline-flex gap-5 font-semibold">
            <h2>Home</h2>
            <h2>About</h2>
            <h2>Contact Us</h2>
            <h2>Login</h2>
          </div>
          <div class="inline-block sm:hidden">
            <span
              ><i class="fa-solid fa-bars" style="color: rgb(0, 0, 0)"></i
            ></span>
          </div>
        </div>
      </nav>

      <div class="container mx-auto works-sans py-5 text-center">
        <h2 class="text-6xl font-bold my-4">Brand New<br />Group of Architects</h2>
        <p class="opacity-70 ">
          We are a passionate team of architects dedicated to designing
          innovative and modern spaces. Our mission is to transform ideas into
          inspiring structures that combine creativity and functionality.
        </p>

        <a href="https://en.wikipedia.org/wiki/Architect" target="_blank">
          <button
            class="bg-[#ff8f0e] text-white px-3 py-4 rounded-xl font-semibold my-5 transition delay-150 duration-300 ease-in-out hover:-translate-y-0.5 hover:scale-105 hover:bg-[#ff8800]"
          >
            Explore More
          </button></a
        >

        <img src="./images/banner.png" alt="" class="rounded-md" />
      </div>
    </header>
  </body>
</html>
